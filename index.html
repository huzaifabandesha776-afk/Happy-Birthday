<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Fiza 🎂</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
        body{
            background: #1a0033;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        
        .container{max-width:500px;width:90%;}
        
        .title{
            font-size: 2.5rem;
            color: #ffd93d;
            margin-bottom: 20px;
            font-weight: bold;
        }
        
        .name{
            font-size: 3rem;
            color: #ff6b9d;
            margin: 20px 0;
            font-weight: bold;
        }
        
        .eyes{
            font-size: 4rem;
            margin: 20px 0;
        }
        
        .stage{display:none;}
        .stage.active{display:block;}
        
        .card{
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            border: 1px solid #fff;
        }
        
        .btn{
            background: linear-gradient(45deg, #ff6b9d, #ffd93d);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin: 20px auto;
            display: block;
            width: 90%;
            max-width: 350px;
        }
        
        .progress{display:flex;gap:10px;justify-content:center;margin:20px 0;}
        .progress-dot{width:12px;height:12px;border-radius:50%;background:#ff6b9d;}
        .progress-dot.active{background:#ffd93d;transform:scale(1.5);}
        
        .arabic{font-size:1.8rem;color:#fff8dc;line-height:1.6;}
    </style>
</head>
