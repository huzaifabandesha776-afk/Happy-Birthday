<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Fiza 🎂</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
        body{background:#000;color:#fff;min-height:100vh;overflow-x:hidden;}
        
        .bg-video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-2;filter:brightness(0.5);}
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle,rgba(0,0,0,0)0%,rgba(0,0,0,0.8)100%);z-index:-1;}
        
        .container{padding:15px;position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
        
        .title{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:800;background:linear-gradient(45deg,#ff6b9d,#ffd93d,#ff6b9d);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:glow 3s ease-in-out infinite alternate;margin-bottom:10px;}
        .name{font-size:clamp(2rem,7vw,3.5rem);color:#ff5fa2;margin:10px 0;text-shadow:0 0 20px rgba(255,95,162,0.8);font-weight:800;line-height:1.1;}
        
        .stage{display:none;flex-direction:column;justify-content:center;align-items:center;min-height:70vh;padding:20px;}
        .stage.active{display:flex;}
        
        .card{background:linear-gradient(145deg,rgba(255,255,255,0.15),rgba(255,255,255,0.05));backdrop-filter:blur(20px);border-radius:25px;padding:25px;margin:15px auto;max-width:90vw;width:100%;border:1px solid rgba(255,255,255,0.2);box-shadow:0 20px 40px rgba(0,0,0,0.4);}
        .card.arabic{font-family:'Noto Naskh Arabic',serif;font-size:clamp(1.4rem,4vw,1.8rem);line-height:1.6;color:#fff8dc;text-shadow:1px 1px 2px rgba(0,0,0,0.5);}
        
        .btn{margin:20px auto;padding:16px 35px;border-radius:50px;border:none;background:linear-gradient(45deg,#ff4d8d,#ff9bd5,#ffd93d);color:#fff;font-size:clamp(1rem,3.5vw,1.2rem);font-weight:700;cursor:pointer;transition:all 0.4s;box-shadow:0 8px 25px rgba(255,77,141,0.4);position:relative;overflow:hidden;display:block;width:90%;max-width:350px;}
        .btn:hover{transform:translateY(-3px) scale(1.05);box-shadow:0 15px 35px rgba(255,77,141,0.6);}
        .btn:active{transform:translateY(-1px);}
        
        .progress{display:flex;gap:10px;margin:20px 0;justify-content:center;flex-wrap:wrap;}
        .progress-dot{width:12px;height:12px;border-radius:50%;background:#ff6b9d;transition:all 0.3s;}
        .progress-dot.active{transform:scale(1.5);background:#ffd93d;box-shadow:0 0 15px #ffd93d;}
        
        /* COUNTDOWN STYLES */
        .countdown{display:flex;justify-content:center;gap:15px;flex-wrap:wrap;margin:20px 0;}
        .countdown-box{background:linear-gradient(145deg,rgba(255,107,157,0.2),rgba(255,217,61,0.2));backdrop-filter:blur(15px);border-radius:20px;padding:20px 15px;min-width:80px;border:1px solid rgba(255,255,255,0.3);}
        .countdown-num{font-size:clamp(2rem,8vw,3.5rem);font-weight:800;background:linear-gradient(45deg,#ff6b9d,#ffd93d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block;}
        .countdown-label{font-size:clamp(0.8rem,2vw,1rem);color:#ffd93d;text-transform:uppercase;letter-spacing:1px;}
        
        .late-msg{background:linear-gradient(145deg,rgba(255,77,141,0.3),rgba(255,77,141,0.1));border:2px solid #ff4d8d;border-radius:20px;padding:20px;margin:20px auto;max-width:90%;font-weight:600;color:#ffd93d;font-size:clamp(1rem,3vw,1.2rem);}
        
        /* MOBILE FIXES */
        @media (max-height: 650px) {.container{padding:10px;}.stage{min-height:60vh;padding:15px;}.btn{margin:15px auto !important;padding:14px 25px;width:95% !important;}}
